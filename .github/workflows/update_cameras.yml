name: Update Camera Data

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # Allows you to run it manually from the "Actions" tab

jobs:
  update-cameras:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # We use requirements.txt to ensure all necessary parsers (like lxml) are installed
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install beautifulsoup4 requests lxml; fi

      - name: Run update script
        run: python update_cameras.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # This adds the updated JSON/CSV file created by your script
          git add .
          # The '|| echo' prevents the workflow from failing if no data has changed
          git commit -m "Automated camera data update" || echo "No changes to commit"
          git push
