name: Update Phoenix Speed Cameras

on:
  schedule:
    # 11:30 UTC = 4:30 AM Phoenix MST. Adjust cron if City updates at different time.
    - cron: "30 11 * * *"
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: |
          pip install requests

      - run: python scripts/update_cameras.py

      - name: Commit changes
        if: success()
        run: |
          git config user.name github-actions[bot]
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/phoenix_speed_cameras.json || true
          if git diff --staged --quiet; then
            echo "No JSON changes."
          else
            git commit -m "update: phoenix_speed_cameras.json [skip ci]"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
