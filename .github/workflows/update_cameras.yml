name: Update Camera Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-cameras:
    runs-on: ubuntu-latest
    steps:
      # CRITICAL: This step pulls your code from GitHub into the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 requests lxml

      - name: Run update script
        # This will now find the file because of the checkout step
        run: python update_cameras.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Automated camera data update" || echo "No changes to commit"
          git push
